version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      # Batch minor/patch bumps into one PR; majors stay separate for review.
      go-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Deliberately pinned by commit (see CLAUDE.md): upstream's untagged-major
      # tags resolve as +incompatible versions that would "upgrade" the pseudo-
      # version pin to an OLDER release.
      - dependency-name: github.com/martian-lang/martian

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # Same policy as gomod: majors arrive individually for review.
      actions-minor-patch:
        update-types: ["minor", "patch"]

  # AWS Batch CDK app. Its package-lock.json is committed, so bumps update the
  # lockfile, and CI (cdk-validation.yml) compiles + synths the app on every
  # bump. versioning-strategy (not lockfile presence) governs package.json:
  # increase-if-necessary rewrites a range only when the new version falls
  # outside it.
  - package-ecosystem: npm
    directory: /deploy/awsbatch-cdk
    schedule:
      interval: weekly
    versioning-strategy: increase-if-necessary
    # @types/node majors are pinned to the CI/runner Node major (see
    # cdk-validation.yml's node-version comment): typings ahead of the runtime
    # let tsc pass on APIs the runtime lacks. Bump both together, by hand.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      cdk-minor-patch:
        update-types: ["minor", "patch"]
