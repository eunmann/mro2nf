version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      # Batch minor/patch bumps into one PR; majors stay separate for review.
      go-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Deliberately pinned by commit (see CLAUDE.md): upstream's untagged-major
      # tags resolve as +incompatible versions that would "upgrade" the pseudo-
      # version pin to an OLDER release.
      - dependency-name: github.com/martian-lang/martian

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # Same policy as gomod: majors arrive individually for review.
      actions-minor-patch:
        update-types: ["minor", "patch"]

  # AWS Batch CDK app. No lockfile is committed, so bumps rewrite the
  # package.json ranges.
  - package-ecosystem: npm
    directory: /deploy/awsbatch-cdk
    schedule:
      interval: weekly
    groups:
      cdk-minor-patch:
        update-types: ["minor", "patch"]
