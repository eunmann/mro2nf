name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build mart + mre
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          for bin in mart mre; do
            out="${bin}-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
            go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "$out" "./cmd/${bin}"
          done
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            mart-${{ matrix.goos }}-${{ matrix.goarch }}*
            mre-${{ matrix.goos }}-${{ matrix.goarch }}*
          fail_on_unmatched_files: true
