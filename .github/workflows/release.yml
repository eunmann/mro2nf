name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Unix targets only: the mre runtime shim drives the Martian adapter ABI
        # (process groups, RSS/prlimit accounting) which is Unix-specific, and the
        # generated pipelines run on Linux backends. Windows is not supported.
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build mro2nf + mre
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          for bin in mro2nf mre; do
            out="${bin}-${{ matrix.goos }}-${{ matrix.goarch }}"
            go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "$out" "./cmd/${bin}"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            mro2nf-${{ matrix.goos }}-${{ matrix.goarch }}
            mre-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  # A single job publishes the release: the 4 build legs racing to create the
  # same release concurrently is a known flakiness source (duplicate-release
  # 409s in action-gh-release).
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            mro2nf-*
            mre-*
          fail_on_unmatched_files: true

  # Publish the runtime base image (mre + Martian adapters at /opt/mro2nf) to
  # GHCR so users build their pipeline image FROM it instead of vendoring mre.
  # Tagged with the release version + latest, multi-arch (amd64 + arm64).
  image:
    name: Runtime image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v3 # arm64 emulation for the final stage
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/mro2nf-runtime
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
