name: PR Validation

# Docs-only changes skip validation entirely: markdown, docs/, and the agent
# skills can't affect anything CI measures. paths-ignore only fires when EVERY
# changed file matches, so a mixed docs+code PR still validates fully.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"
      - LICENSE
  # Run for PRs against ANY base branch, not just main, so stacked PRs (a PR
  # whose base is another feature branch) are validated too.
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"
      - LICENSE

permissions:
  contents: read

# Cancel superseded runs for PR branches, but never for main: pushes to main
# all share ref refs/heads/main, so cancel-in-progress there would leave merged
# commits with no completed validation run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum
      - name: Check for vulnerabilities
        # Pinned so a new govulncheck release (or one needing a newer toolchain)
        # cannot change CI behavior without a repo change.
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4 && govulncheck ./...
      # golangci-lint runs govet, so there is no separate `go vet` step.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - name: Check for dead code
        # Whole-program reachability from the two binaries; catches orphans
        # golangci's `unused` misses (exported or test-reachable functions).
        run: make deadcode

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build all packages
        run: go build ./...

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests (race detector)
        run: go test -race ./...
      - name: Coverage gate
        run: make cover

  # Transpiles every fixture, runs it under Nextflow, and diffs the result against
  # the committed real-mrp golden. (Goldens are committed, so mrp is not needed.)
  e2e:
    name: E2E (Nextflow vs mrp goldens)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # The harnesses skip cleanly on a dev box missing a tool, but in CI a
      # missing prerequisite must FAIL the job, not silently pass it.
      E2E_REQUIRE: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: nf-core/setup-nextflow@v2 # installs + caches the Nextflow binary
      - name: Resolve Nextflow version
        id: nxf
        # setup-nextflow exposes no version output, so read it back; keying the
        # plugin cache on it means a Nextflow bump can't be served stale plugins.
        run: echo "ver=$(nextflow -version 2>&1 | grep -oP 'version \K[0-9.]+')" >> "$GITHUB_OUTPUT"
      - name: Cache Nextflow plugins
        uses: actions/cache@v6
        with:
          path: ~/.nextflow
          key: nextflow-${{ runner.os }}-${{ steps.nxf.outputs.ver }}
      # Static-parse every generated project with the formal language-server
      # parser (#48): a Groovy syntax error in a rarely-run emission branch fails
      # here with file/line, before the slower golden runs can miss it. setup-
      # nextflow installs latest (>= 25.04), which the target asserts.
      - run: make lint-nf
      - run: make test-e2e
      # Data-plane epic gate (#17/#13): the transfer-multiplier benchmark must not
      # regress vs bench/baseline.json.
      - run: make bench

  # The same pipelines under the docker executor (containers that mount only their
  # work dir) — the AWS Batch / HealthOmics no-shared-filesystem model. Runs in
  # parallel with the local e2e job above.
  e2e-docker:
    name: E2E (container isolation)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      E2E_REQUIRE: "1" # missing prereqs must fail CI, not skip it
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: nf-core/setup-nextflow@v2
      - name: Resolve Nextflow version
        id: nxf
        run: echo "ver=$(nextflow -version 2>&1 | grep -oP 'version \K[0-9.]+')" >> "$GITHUB_OUTPUT"
      - name: Cache Nextflow plugins
        uses: actions/cache@v6
        with:
          path: ~/.nextflow
          key: nextflow-${{ runner.os }}-${{ steps.nxf.outputs.ver }}
      - run: make test-e2e-docker
