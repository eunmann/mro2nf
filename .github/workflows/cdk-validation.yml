name: CDK Validation

# NOTE: this workflow is path-filtered. Do NOT add its check to the branch-
# protection required checks: a required check that never triggers on non-CDK
# PRs deadlocks merges as "Expected — Waiting for status". As of 2026-07 the
# required contexts (Lint, Build, Unit tests, the two E2E suites) do not
# include it — keep it that way.
#
# The deploy/awsbatch-cdk app is TypeScript, invisible to the Go-centric PR
# Validation workflow — without this, a dependabot bump of aws-cdk-lib would
# merge green having exercised zero of its code (#133). A separate workflow
# with `paths:` (rather than a job in pr-validation.yml) means it only runs —
# and only reports a check — when the CDK app actually changed.
on:
  push:
    branches: [main]
    paths:
      - "deploy/awsbatch-cdk/**"
      - ".github/workflows/cdk-validation.yml"
  pull_request:
    paths:
      - "deploy/awsbatch-cdk/**"
      - ".github/workflows/cdk-validation.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  cdk:
    name: Compile + synth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: deploy/awsbatch-cdk
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          # Keep in lockstep with the @types/node major in package.json.
          node-version: 24
          cache: npm
          cache-dependency-path: deploy/awsbatch-cdk/package-lock.json
      - name: Install (reproducible, from the committed lockfile)
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      # Offline by design: bin/app.ts is environment-agnostic (Fn::GetAZs, no
      # account lookups), so synth needs no AWS credentials.
      - name: Synthesize
        run: npx cdk synth --quiet
