version: "2"

linters:
  default: all
  disable:
    - lll
    - wsl
    - wsl_v5
    - varnamelen
    - tagliatelle
    - paralleltest
    - exhaustruct
    - canonicalheader
    - depguard
    - noinlineerr
    # Lookup helpers legitimately return (nil, nil) to mean "no result".
    - nilnil
  settings:
    gomoddirectives:
      # We use a local `replace` for the Martian module during development.
      replace-local: true
    goconst:
      # Test fixtures legitimately repeat string literals; extracting them as
      # constants harms readability. Production code is still checked.
      ignore-tests: true
    cyclop:
      max-complexity: 15
    funlen:
      lines: 80
    interfacebloat:
      max: 20
    gosec:
      excludes:
        - G404
        # The shim reads/writes Martian metadata files at transpiler- and
        # runtime-controlled paths, not attacker-controlled input; the CLI reads
        # the .mro / overrides file the user named on the command line.
        - G304
        - G703
        # The shim launches the Martian adapter; the command and args come from
        # the transpiled pipeline, not attacker-controlled input.
        - G204
        # Integer-overflow flags on small, non-negative numeric conversions
        # (resource counts, array/map dimensions).
        - G115
    exhaustive:
      default-signifies-exhaustive: true
    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - github.com/eunmann/mro2nf/internal
        # The Martian AST exposes parameters via the StructMemberLike interface.
        - github.com/martian-lang/martian/martian/syntax
  exclusions:
    paths:
      # The CDK app under deploy/ is TypeScript; its node_modules ships stray Go
      # template files that aren't part of any package. Never lint there.
      - deploy/
    rules:
      # In-package tests are intentional here (they exercise unexported helpers).
      # Tests also legitimately launch subprocesses, leave external errors
      # unwrapped, and pass fixed args to helpers. Table-driven tests are long by
      # design (the case list is data, not procedural code), so funlen is off for
      # tests — it would only push us to split case tables artificially.
      - path: "_test\\.go"
        linters:
          - testpackage
          - gosec
          - wrapcheck
          - unparam
          - noctx
          - funlen
formatters:
  enable:
    - gci
    - gofmt
    - goimports
    - gofumpt

issues:
  max-issues-per-linter: 0

run:
  timeout: 10m
  tests: true
  go: "1.26"
